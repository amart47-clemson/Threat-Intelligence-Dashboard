services:
  - type: web
    name: threat-intel-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: threatintel-db
          property: connectionString
      - key: OTX_API_KEY
        sync: false
      - key: ABUSEIPDB_API_KEY
        sync: false
      - key: FLASK_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false

  - type: web
    name: threat-intel-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://threat-intel-api.onrender.com/api/*
    envVars:
      - key: VITE_API_URL
        value: https://threat-intel-api.onrender.com

databases:
  - name: threatintel-db
    plan: free
